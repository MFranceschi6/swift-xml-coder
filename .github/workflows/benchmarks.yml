name: Benchmarks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # update-baseline: runs on every push to main.
  # Generates a ci-main baseline on the CI runner and stores it in the
  # Actions cache so PRs can restore it without re-running on main.
  # ──────────────────────────────────────────────────────────────────────────
  update-baseline:
    name: Update Benchmark Baseline (main)
    if: github.event_name == 'push'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.1"

      - name: Cache Benchmarks SPM
        uses: actions/cache@v4
        with:
          path: Benchmarks/.build
          key: macos-15-benchmarks-spm-${{ hashFiles('Benchmarks/Package.swift') }}
          restore-keys: |
            macos-15-benchmarks-spm-

      - name: Install jemalloc
        run: brew install jemalloc

      - name: Generate ci-main baseline
        run: |
          cd Benchmarks
          swift package --allow-writing-to-package-directory \
            benchmark baseline update ci-main

      - name: Cache ci-main baseline
        uses: actions/cache/save@v4
        with:
          path: Benchmarks/.benchmarkBaselines/SwiftXMLCoderBenchmarks/ci-main
          key: benchmark-baseline-main-${{ github.sha }}

  # ──────────────────────────────────────────────────────────────────────────
  # regression: runs on every PR to main.
  # Restores the ci-main baseline from cache (written by update-baseline on
  # the last main push). Falls back to regenerating it from origin/main on
  # the same runner if the cache is cold. Then runs PR benchmarks and
  # compares. Warning-only: does not block merging.
  # ──────────────────────────────────────────────────────────────────────────
  regression:
    name: Benchmark Regression
    if: github.event_name == 'pull_request'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for the fallback git checkout of origin/main

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.1"

      - name: Cache Benchmarks SPM
        uses: actions/cache@v4
        with:
          path: Benchmarks/.build
          key: macos-15-benchmarks-spm-${{ hashFiles('Benchmarks/Package.swift') }}
          restore-keys: |
            macos-15-benchmarks-spm-

      - name: Install jemalloc
        run: brew install jemalloc

      - name: Restore ci-main baseline from cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          # Exact key will never match on a PR — the restore-key picks up the
          # latest entry written by update-baseline on any main push.
          key: benchmark-baseline-main-${{ github.sha }}
          restore-keys: |
            benchmark-baseline-main-
          path: Benchmarks/.benchmarkBaselines/SwiftXMLCoderBenchmarks/ci-main

      - name: Generate ci-main baseline (cold-cache fallback)
        if: steps.cache-restore.outputs.cache-matched-key == ''
        run: |
          git checkout origin/main
          cd Benchmarks
          swift package --allow-writing-to-package-directory \
            benchmark baseline update ci-main
          # Save baseline before switching branches (git checkout would drop it)
          cp -r .benchmarkBaselines/SwiftXMLCoderBenchmarks/ci-main /tmp/ci-main-baseline
          # Return to repo root, then switch back to PR code
          cd ..
          git checkout ${{ github.sha }}
          # Restore baseline into the PR workspace from the tmp copy
          mkdir -p Benchmarks/.benchmarkBaselines/SwiftXMLCoderBenchmarks/
          cp -r /tmp/ci-main-baseline \
            Benchmarks/.benchmarkBaselines/SwiftXMLCoderBenchmarks/ci-main

      - name: Compare PR benchmarks against main baseline
        id: benchmark
        run: |
          set -o pipefail
          cd Benchmarks
          swift package --allow-writing-to-package-directory \
            benchmark baseline check ci-main \
            --format markdown 2>&1 | tee /tmp/benchmark-comparison.md
        continue-on-error: true

      - name: Post comparison to step summary
        if: always()
        run: |
          echo "## Benchmark Regression Check (PR vs main)" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/benchmark-comparison.md ]; then
            cat /tmp/benchmark-comparison.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No benchmark output was generated._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Warn on regression
        if: steps.benchmark.outcome == 'failure'
        run: |
          echo "::warning file=Benchmarks/Package.swift::Benchmark regression detected (PR vs main) — see the job step summary for details."

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: /tmp/benchmark-comparison.md
          if-no-files-found: warn
          retention-days: 30

  # ──────────────────────────────────────────────────────────────────────────
  # internal: runs on workflow_dispatch.
  # Executes the internal benchmark suite on the GitHub-hosted macOS runner
  # so local README / markdown measurements can be compared against CI output.
  # ──────────────────────────────────────────────────────────────────────────
  internal:
    name: Internal Benchmarks
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.1"

      - name: Cache Benchmarks SPM
        uses: actions/cache@v4
        with:
          path: Benchmarks/.build
          key: macos-15-benchmarks-spm-${{ hashFiles('Benchmarks/Package.swift') }}
          restore-keys: |
            macos-15-benchmarks-spm-

      - name: Install jemalloc
        run: brew install jemalloc

      - name: Run internal benchmarks
        run: |
          cd Benchmarks
          swift package --disable-sandbox benchmark \
            --format markdown 2>&1 | tee /tmp/internal-benchmark-results.md

      - name: Post results to step summary
        if: always()
        run: |
          echo "## Internal Benchmarks" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/internal-benchmark-results.md ]; then
            cat /tmp/internal-benchmark-results.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No benchmark output was generated._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload internal benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: internal-benchmarks-${{ github.sha }}
          path: /tmp/internal-benchmark-results.md
          if-no-files-found: warn
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────
  # comparative: runs on workflow_dispatch or weekly schedule.
  # Compares SwiftXMLCoder vs CoreOffice/XMLCoder (Codable encode/decode).
  # Not part of regression checks — XMLCoder version changes independently.
  # ──────────────────────────────────────────────────────────────────────────
  comparative:
    name: Comparative Benchmarks (SwiftXMLCoder vs XMLCoder)
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.1"

      - name: Cache Benchmarks SPM
        uses: actions/cache@v4
        with:
          path: Benchmarks/.build
          key: macos-15-benchmarks-spm-${{ hashFiles('Benchmarks/Package.swift') }}
          restore-keys: |
            macos-15-benchmarks-spm-

      - name: Install jemalloc
        run: brew install jemalloc

      - name: Run comparative benchmarks
        run: |
          cd Benchmarks
          swift package --disable-sandbox benchmark \
            --target ComparisonBenchmarks \
            --format markdown 2>&1 | tee /tmp/comparative-results.md

      - name: Post results to step summary
        if: always()
        run: |
          echo "## Comparative Benchmarks: SwiftXMLCoder vs XMLCoder" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/comparative-results.md ]; then
            cat /tmp/comparative-results.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No benchmark output was generated._" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload comparative results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: comparative-benchmarks-${{ github.sha }}
          path: /tmp/comparative-results.md
          if-no-files-found: warn
          retention-days: 90
