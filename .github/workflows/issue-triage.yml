name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  label-needs-triage:
    runs-on: ubuntu-latest
    steps:
      - name: Apply needs-triage label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage'],
            });

  label-by-prefix:
    runs-on: ubuntu-latest
    steps:
      - name: Apply label based on issue title prefix
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            if (/^(feat|feature)[\s:(]/.test(title))        labels.push('enhancement');
            if (/^(bug|fix)[\s:(]/.test(title))             labels.push('bug');
            if (/^docs?[\s:(]/.test(title))                 labels.push('documentation');
            if (/^(perf|performance)[\s:(]/.test(title))    labels.push('performance');
            if (/macro/.test(title))                         labels.push('macros');
            if (/stream/.test(title))                        labels.push('streaming');
            if (/swift\s*6|concurren/.test(title))          labels.push('swift-6');
            if (/break/.test(title))                         labels.push('breaking-change');

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels,
              });
            }
