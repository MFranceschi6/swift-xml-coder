name: Fuzz

on:
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every night
  workflow_dispatch:        # allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # fuzz: runs each harness under libFuzzer + ASan for FUZZ_TIME seconds.
  # Any crash or memory error is reported as a CI failure and the reproducer
  # input is uploaded as an artifact for triage.
  #
  # Linux-only: libFuzzer is most reliable on the LLVM-backed Linux toolchain.
  # ──────────────────────────────────────────────────────────────────────────
  fuzz:
    name: Fuzz (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzXMLParser, FuzzXMLDecoder]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.1"

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: ubuntu-22.04-spm-swift6.1-fuzz-${{ hashFiles('Package*.swift') }}
          restore-keys: |
            ubuntu-22.04-spm-swift6.1-fuzz-

      - name: Install libxml2
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev

      - name: Run fuzzer
        env:
          FUZZ_TIME: "120"
          ARTIFACT_DIR: /tmp/fuzz-output
        run: |
          chmod +x FuzzTests/run_fuzzer.sh
          FuzzTests/run_fuzzer.sh ${{ matrix.target }}

      - name: Upload crash reproducer
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crash-${{ matrix.target }}-${{ github.sha }}
          path: /tmp/fuzz-output/${{ matrix.target }}/
          retention-days: 90

  # ──────────────────────────────────────────────────────────────────────────
  # typecheck: verifies the fuzz harnesses compile on every push/PR so they
  # don't silently rot between nightly runs.
  # ──────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck fuzz harnesses
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "6.1"

      - name: Cache SPM build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .build
            FuzzTests/.build
          key: ubuntu-22.04-spm-swift6.1-fuzz-typecheck-${{ hashFiles('Package*.swift', 'FuzzTests/Package.swift') }}
          restore-keys: |
            ubuntu-22.04-spm-swift6.1-fuzz-typecheck-

      - name: Install libxml2
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev

      - name: Build fuzz targets (type-check only)
        run: swift build --package-path FuzzTests
