name: Stale Issues

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been inactive for 60 days and is now marked as stale.
            If it is still relevant, please leave a comment or remove the `stale` label.
            It will be closed in 14 days if there is no further activity.
          close-issue-message: >
            Closing due to 14 days of inactivity after being marked stale.
            Feel free to reopen if the issue is still relevant.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: stale
          exempt-issue-labels: 'pinned,help wanted,needs-repro'
          remove-stale-when-updated: true
          operations-per-run: 100
          # Do not touch PRs
          days-before-pr-stale: -1
          days-before-pr-close: -1
